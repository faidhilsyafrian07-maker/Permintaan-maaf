<!DOCTYPE html>
<html>
<head>
  <title>Maaf Ya ❤️</title>
  <style>
    body {
      text-align: center;
      font-family: Arial, sans-serif;
      background: #ffe6ea;
      padding: 20px;
    }

    h1 {
      color: #e91e63;
      font-size: 35px;
    }

    p {
      font-size: 18px;
      line-height: 1.6;
      color: #333;
    }

    .foto {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 15px;
    }

    .foto img {
      width: 250px;
      border-radius: 15px;
    }

    .hati {
      font-size: 40px;
      animation: naik 1s infinite alternate;
    }

    @keyframes naik {
      from {
        transform: translateY(0);
      }
      to {
        transform: translateY(-10px);
      }
    }

    .box {
      background: white;
      padding: 20px;
      border-radius: 20px;
      max-width: 700px;
      margin: auto;
    }
  </style>
</head>

<body>

<div class="box">

<div class="hati">❤️</div>

<h1>Maaf ya ❤️</h1>

<div class="foto">
<img src="IMG-20260311-WA0024.jpg">
<img src="IMG-20260422-WA0040.jpg">
<img src="IMG-20260409-WA0092.jpg">
<img src="IMG-20260409-WA0042.jpg">
<img src="NAMA-FOTO-KE-5.jpg">
</div>

<p>
Aku minta maaf atas semua kesalahan yang pernah aku buat.
Aku tidak bermaksud membuat kamu kecewa atau terluka.
<br><br>
Terima kasih sudah pernah ada, sudah sabar, dan sudah memberikan banyak hal baik.
Semoga kita bisa memperbaiki semuanya dan menjadi lebih baik lagi.
❤️
</p>

</div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>Untuk Wifa ❤️</title>

<style>

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:linear-gradient(#ffd6e5,#fff);
  text-align:center;
  padding:30px;
  overflow:hidden;
}

.kartu{
  background:white;
  max-width:650px;
  margin:auto;
  padding:35px;
  border-radius:30px;
  box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

h1{
  color:#e91e63;
  font-size:55px;
}

h2{
  color:#555;
  font-size:28px;
}

p{
  font-size:22px;
  line-height:1.8;
  color:#444;
}

.foto{
  width:320px;
  border-radius:25px;
  box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

.hati{
  font-size:70px;
  animation:denyut 1s infinite alternate;
}

@keyframes denyut{
  from{
    transform:scale(1);
  }
  to{
    transform:scale(1.2);
  }
}

.muncul{
  animation:muncul 3s;
}

@keyframes muncul{
  from{
    opacity:0;
    transform:translateY(30px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

button{
  background:#e91e63;
  color:white;
  border:0;
  padding:16px 35px;
  border-radius:40px;
  font-size:22px;
}

.bunga{
  position:fixed;
  top:-50px;
  font-size:35px;
  animation:jatuh 6s infinite;
}

@keyframes jatuh{
  from{
    transform:translateY(-50px);
  }
  to{
    transform:translateY(100vh);
  }
}

</style>

</head>


<body>

<audio controls autoplay loop>
<source src="1d429762199a9347ecdc5b8175919cba.mp3" type="audio/mpeg">
</audio>


<div class="bunga">🌸</div>
<div class="bunga" style="left:40%;animation-delay:2s;">🌹</div>
<div class="bunga" style="left:80%;animation-delay:1s;">🌸</div>


<div class="kartu muncul">

<div class="hati">❤️</div>

</div>

</body>
</html>

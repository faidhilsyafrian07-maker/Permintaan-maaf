  background:#e91e63;
  color:white;
  border:none;
  padding:15px 35px;
  border-radius:40px;
  font-size:22px;

.bunga{
  position:fixed;
  top:-50px;
  font-size:35px;
  animation:jatuh 6s infinite;
}

@keyframes jatuh{
  from{
    transform:translateY(-50px);
  }
  to{
    transform:translateY(100vh);
  }
}

<!DOCTYPE html>
<html>
<head>
<title>Pesan Terakhir ❤️</title>

<style>
body{
  text-align:center;
  font-family:Arial;
  background:#ffe6ee;
  padding:30px;
}

.box{
  background:white;
  padding:25px;
  border-radius:25px;
}

h1{
  color:#e91e63;
}

.bunga{
  position:fixed;
  top:-50px;
  font-size:35px;
  animation:jatuh 5s infinite;
}

@keyframes jatuh{
  from{
    transform:translateY(-50px);
  }
  to{
    transform:translateY(100vh);
  }
}

button{
  background:#e91e63;
  color:white;
  border:0;
  padding:12px 25px;
  border-radius:30px;
}
</style>

</head>

<body>

<!-- Musik -->
<audio controls autoplay loop>
  <source src="1d429762199a9347ecdc5b8175919cba.mp3" type="audio/mpeg">
</audio>

<!-- Bunga jatuh -->
<div class="bunga">🌸</div>
<div class="bunga" style="left:30%;animation-delay:2s;">🌹</div>
<div class="bunga" style="left:70%;animation-delay:1s;">🌸</div>

<div class="box">

<h1>Pesan Untuk Kamu ❤️</h1>

<p>
Aku minta maaf atas semua kesalahan yang pernah aku lakukan.
<br><br>
Terima kasih sudah menjadi bagian dari cerita hidupku.
Semoga kita bisa menjadi lebih baik lagi.
❤️
</p>

<button>Kembali ❤️</button>

</div>

</body>
</html>

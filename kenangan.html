<!DOCTYPE html>
<html>
<head>
<title>Kenangan Wifa ❤️</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:linear-gradient(#fff0f5,#ffe6ee);
  text-align:center;
  padding:30px;
}

.kartu{
  background:white;
  max-width:750px;
  margin:auto;
  padding:25px;
  border-radius:30px;
  box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

h1{
  color:#e91e63;
  font-size:45px;
}

p{
  font-size:20px;
  line-height:1.7;
}

.album{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
}

.album img{
  width:230px;
  height:230px;
  object-fit:cover;
  margin:10px;
  border-radius:20px;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

button{
  background:#e91e63;
  color:white;
  border:none;
  padding:15px 35px;
  border-radius:40px;
  font-size:20px;
}

.bunga{
  position:fixed;
  top:-50px;
  font-size:35px;
  animation:jatuh 6s infinite;
}

@keyframes jatuh{
  from{
    transform:translateY(-50px);
  }
  to{
    transform:translateY(100vh);
  }
}

</style>

</head>

<body>

<audio controls autoplay loop>
<source src="1d429762199a9347ecdc5b8175919cba.mp3" type="audio/mpeg">
</audio>

<div class="bunga">🌸</div>
<div class="bunga" style="left:40%;animation-delay:2s;">🌹</div>
<div class="bunga" style="left:80%;animation-delay:1s;">🌸</div>

</html>

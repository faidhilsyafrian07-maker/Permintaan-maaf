<!DOCTYPE html>
<html>
<head>

<title>Kenangan Wifa ❤️</title>

<style>

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:linear-gradient(#fff0f5,#ffe6ee);
  text-align:center;
  padding:30px;
}

.album{
  max-width:800px;
  margin:auto;
}

h1{
  color:#e91e63;
  font-size:50px;
}

p{
  font-size:22px;
  line-height:1.8;
  color:#444;
}

.foto{
  display:inline-block;
  background:white;
  padding:15px;
  margin:15px;
  border-radius:15px;
  box-shadow:0 8px 20px rgba(0,0,0,0.15);
  animation:muncul 2s;
}

.foto img{
  width:250px;
  height:250px;
  object-fit:cover;
  border-radius:10px;
}

@keyframes muncul{
  from{
    opacity:0;
    transform:translateY(40px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

button{
  background:#e91e63;
  color:white;
  border:0;
  padding:16px 35px;
  border-radius:40px;
  font-size:22px;
}

.bunga{
  position:fixed;
  top:-50px;
  font-size:35px;
  animation:jatuh 6s infinite;
}

@keyframes jatuh{
  from{
    transform:translateY(-50px);
  }
  to{
    transform:translateY(100vh);
  }
}

</style>

</head>


<body>


<audio controls autoplay loop>

</audio>
